services:
  next:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://photo_user:wang619218505@photo-map-db:5432/photomap_db
    container_name: photo-map-next
    env_file:
      - .env.docker
    ports:
      - '3000:3000'
    volumes:
      - /mnt/map-photos:/app/photos
    restart: always
    networks:
      - photo_map_network
    # 映射宿主机host，需要访问Ollama服务
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  photo_map_network:
    external: true
